name: Build Windows Desktop

on:
  push:
    branches:
      - devops1
    paths:
      - 'crates/openfang-desktop/**'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'crates/openfang-desktop/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows Desktop / ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            arch: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-desktop-${{ matrix.target }}

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download WiX Toolset 3.14
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix314rtm/wix314-binaries.zip" -OutFile "wix314-binaries.zip"
          # Extract to temp directory
          Expand-Archive -Path "wix314-binaries.zip" -DestinationPath "wix314"
          # Set WiX path as environment variable
          echo "WIX_PATH=$pwd\wix314" >> $env:GITHUB_ENV
          # Add to PATH
          $env:PATH += ";$pwd\wix314"
          # Verify WiX is available (check candle.exe version)
          candle.exe -version

      - name: Build and bundle Tauri desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIX: ${{ env.WIX_PATH }}
        with:
          projectPath: crates/openfang-desktop
          args: "--target ${{ matrix.target }}"
          releaseId: ${{ github.event.pull_request.number || github.sha }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-${{ matrix.arch }}
          path: crates/openfang-desktop/target/${{ matrix.target }}/release/bundle/*
